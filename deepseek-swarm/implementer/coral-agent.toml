edition = 4

[agent]
name = "implementer"
version = "0.1.0"
summary = "Writes code into the shared Daytona sandbox from the planner's brief"
description = "Turns the planner's brief into working code in /workspace. Uses daytona_write_file to create files, daytona_exec to run commands, and web_search_exa for current library docs. Hands off to the reviewer when code is ready."
readme = """
# implementer

Turns the planner's brief into working code in /workspace. Uses daytona_write_file to create files, daytona_exec to run commands, and web_search_exa for current library docs. Hands off to the reviewer when code is ready.
"""

[agent.license]
type = "text"
text = "apache-2.0"

[marketplace]
keywords = ["coding", "implementer", "coral", "deepseek", "typescript", "ai-sdk"]

[options]
MAX_ITERATIONS = { type = "u32", default = 60, display.description = "Maximum number of LLM iterations to run." }
ITERATION_DELAY_MS = { type = "u64", default = 0, display.description = "Milliseconds to wait between iterations." }
MAX_TOKENS = { type = "u32", default = 500000, display.description = "Maximum tokens to use during the session." }
MAX_STEPS_PER_ITERATION = { type = "u32", default = 16, display.description = "Maximum AI SDK steps within one iteration." }

[options.EXTRA_SYSTEM_PROMPT]
type = "string"
display.description = "Additional system instructions for this agent role"
display.multiline = true
default = """You are the implementer in a 3-agent coding team (planner, implementer, reviewer). You have access to a shared Daytona sandbox at /workspace. Use daytona_list_files and daytona_read_file to understand existing code, daytona_write_file to create or edit files (full-file overwrites, not diffs), and daytona_exec to run commands (install deps, run tests, inspect output). Use web_search_exa or web_fetch_exa when you need current docs for an unfamiliar library or API. When the code is written and locally tested, mention @reviewer with a pointer to the files changed. Respond to reviewer feedback with specific fixes."""

[options.EXTRA_INITIAL_USER_PROMPT]
type = "string"
display.description = "Additional instructions for the initial user message (leave empty to wait for mentions on session start)"
display.multiline = true
default = ""

[options.FOLLOWUP_USER_PROMPT]
type = "string"
display.description = "The prompt to use for follow-up iterations"
display.multiline = true
default = """[automated message] Continue as the implementer. If you have a brief, advance the implementation. If the reviewer flagged issues, fix them. If you're waiting on the planner or reviewer, wait for mentions."""

[options.MODEL_PROVIDER]
type = "string"
display.description = "The LLM provider to use (only OPENROUTER supported in this swarm)"
default = "OPENROUTER"

[options.MODEL_PROVIDER_URL_OVERRIDE]
type = "string"
display.description = "OpenAI-compatible base URL override (leave empty to use OpenRouter default)"
default = ""

[options.MODEL_API_KEY]
type = "string"
required = true
display.description = "API key for the selected provider (OpenRouter token by default)"
secret = true

[options.MODEL_ID]
type = "string"
default = "deepseek/deepseek-v4-flash"
display.description = "The model ID to use"

[options.EXA_API_KEY]
type = "string"
required = true
display.description = "Exa API key for the hosted MCP research tools (web_search_exa, web_fetch_exa)"
secret = true

[options.DAYTONA_API_KEY]
type = "string"
required = true
display.description = "Daytona API key — authenticates against the Toolbox REST API for the shared sandbox"
secret = true

[options.DAYTONA_SANDBOX_ID]
type = "string"
required = true
display.description = "ID of the shared sandbox. Orchestrator (Claude Code) creates the sandbox before the session and injects the id here."

[options.SYSTEM_PROMPT]
type = "string"
display.description = "The system prompt to use"
display.multiline = true
default = """
You are an AI agent designed to assist users by leveraging available tools and resources. Follow the user's instructions carefully and use the tools at your disposal to provide accurate, useful responses.
-- Start of messages and status --
<resource>coral://instruction</resource>
<resource>coral://state</resource>
-- End of messages and status --
"""

[runtimes.executable]
path = "./run.sh"
arguments = []
