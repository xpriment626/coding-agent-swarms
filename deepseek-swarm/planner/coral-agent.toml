edition = 4

[agent]
name = "planner"
version = "0.1.0"
summary = "Task decomposition and coordination for the DeepSeek V4 coding swarm"
description = "Reads the user's task, decomposes it into concrete subtasks, lays out a file plan for the shared Daytona sandbox, and hands off to the implementer. Does not write code itself."
readme = """
# planner

Reads the user's task, decomposes it into concrete subtasks, lays out a file plan for the shared Daytona sandbox, and hands off to the implementer. Does not write code itself.
"""

[agent.license]
type = "text"
text = "apache-2.0"

[marketplace]
keywords = ["coding", "planner", "coral", "deepseek", "typescript", "ai-sdk"]

[options]
MAX_ITERATIONS = { type = "u32", default = 60, display.description = "Maximum number of LLM iterations to run." }
ITERATION_DELAY_MS = { type = "u64", default = 0, display.description = "Milliseconds to wait between iterations." }
MAX_TOKENS = { type = "u32", default = 300000, display.description = "Maximum tokens to use during the session." }
MAX_STEPS_PER_ITERATION = { type = "u32", default = 12, display.description = "Maximum AI SDK steps (LLM call + tool execution) within one iteration." }

[options.EXTRA_SYSTEM_PROMPT]
type = "string"
display.description = "Additional system instructions for this agent role"
display.multiline = true
default = """You are the planner in a 3-agent coding team (planner, implementer, reviewer). Decompose the user's task into concrete subtasks, decide the file layout in the shared Daytona sandbox (workspace is /workspace), and hand a clear brief off to @implementer via a focused thread. Use web_search_exa when you need current API docs or library best practices. Do NOT write code — that's the implementer's job. When the implementer and reviewer signal completion, summarize what was built."""

[options.EXTRA_INITIAL_USER_PROMPT]
type = "string"
display.description = "Additional instructions for the initial user message (leave empty to wait for mentions on session start)"
display.multiline = true
default = ""

[options.FOLLOWUP_USER_PROMPT]
type = "string"
display.description = "The prompt to use for follow-up iterations"
display.multiline = true
default = """[automated message] Continue as the planner. If the implementer or reviewer needs clarification, respond. If the task is done, summarize and close."""

[options.MODEL_PROVIDER]
type = "string"
display.description = "The LLM provider to use (only OPENROUTER supported in this swarm)"
default = "OPENROUTER"

[options.MODEL_PROVIDER_URL_OVERRIDE]
type = "string"
display.description = "OpenAI-compatible base URL override (leave empty to use OpenRouter default)"
default = ""

[options.MODEL_API_KEY]
type = "string"
required = true
display.description = "API key for the selected provider (OpenRouter token by default)"
secret = true

[options.MODEL_ID]
type = "string"
default = "deepseek/deepseek-v4-flash"
display.description = "The model ID to use"

[options.EXA_API_KEY]
type = "string"
required = true
display.description = "Exa API key for the hosted MCP research tools (web_search_exa, web_fetch_exa)"
secret = true

[options.DAYTONA_API_KEY]
type = "string"
required = true
display.description = "Daytona API key — authenticates against the Toolbox REST API for the shared sandbox"
secret = true

[options.DAYTONA_SANDBOX_ID]
type = "string"
required = true
display.description = "ID of the shared sandbox. Orchestrator (Claude Code) creates the sandbox before the session and injects the id here."

[options.SYSTEM_PROMPT]
type = "string"
display.description = "The system prompt to use"
display.multiline = true
default = """
You are an AI agent designed to assist users by leveraging available tools and resources. Follow the user's instructions carefully and use the tools at your disposal to provide accurate, useful responses.
-- Start of messages and status --
<resource>coral://instruction</resource>
<resource>coral://state</resource>
-- End of messages and status --
"""

[runtimes.executable]
path = "./run.sh"
arguments = []
