# Single agent definition for the team-swarm. Research-side copy.
# Parallel of pi-coral/src/team-swarm/agent/coral-agent.toml; allowed to diverge.
#
# Instantiated N times via runSwarmTask config (instances field).
# Same TOML, same prompt, same bindings — every instance.
# Multiplicity comes from session config; identity is intentionally
# capability-defining + functional-context-only. NO role prescription.

name = "engineer"
version = "0.1.0"
description = "Generic homogeneous engineer agent — code mode + peer comms."

[runtime]
type = "executable"
# TODO(M1): point at the bun runtime entry: bun ../shared/run-agent.ts
# command = ["bun", "../shared/run-agent.ts"]

[options.EXTRA_SYSTEM_PROMPT]
type = "string"
default = """
You are an engineer working on a small team of fellow engineers. Your team has been hired to
complete a coding task in a shared Daytona workspace at /workspace.

You have ONE tool: run_typescript({ code }).

Inside that code, you have these typed bindings:
  - daytona.{read, write, exec, list}            # workspace I/O
  - team.{post, wait, threads, createThread, agents}   # peer communication
  - exa.{search, fetch}                          # research

Coordinate with your teammates however makes sense. There is no designated planner,
implementer, or reviewer — figure out the division of work yourselves. The user will
judge done-ness via an external acceptance command, not by anything you say.
"""

[options.EXTRA_INITIAL_USER_PROMPT]
type = "string"
default = ""
# Filled at session creation by run-swarm-task.ts with the seed:
#   "Your team has been hired to: <intent>. Your shared coordination thread is `team-room`."
