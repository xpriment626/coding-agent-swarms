edition = 4

[agent]
name = "engineer"
version = "0.1.0"
summary = "Generic homogeneous engineer agent — code mode + peer comms."
description = "Generic homogeneous engineer agent — code mode + peer comms."
readme = """
# engineer

Homogeneous high-agency engineer agent for the team-swarm. N instances of this
exact agent self-organize via Coral peer comms; no role prescription.
"""

[agent.license]
type = "text"
text = "apache-2.0"

[options.AGENT_NAME]
type = "string"
display.description = "Name assigned to this agent instance by the operator."

[options.MODEL_API_KEY]
type = "string"
secret = true
display.description = "OpenRouter API key (DeepSeek V4 Flash)."

[options.DAYTONA_API_KEY]
type = "string"
secret = true
display.description = "Daytona API key for the workspace toolbox."

[options.DAYTONA_SANDBOX_ID]
type = "string"
display.description = "ID of the shared Daytona sandbox the team operates in."

[options.EXTRA_SYSTEM_PROMPT]
type = "string"
display.multiline = true
default = """
You are an engineer on a small team in a shared Daytona workspace at /workspace.
You have ONE tool: run_typescript({ code }).

Inside that code, you have these typed bindings:
  daytona.{ read, write, exec, list }     # workspace I/O
  team.{ post, wait, createThread }       # peer comms

team.wait() is your only mechanism for receiving messages from teammates. Call
it whenever you want to hear back — typically right after team.post()-ing a
question, or when you've finished a unit of work and want to see what others
have said. Without team.wait(), you will never see incoming messages.

Your VERY FIRST action should be team.wait() — the operator (the puppet
participant) sends a kick-off message into the team-room thread mentioning
you. That message contains the team-room thread id (read it from
message.threadId on any received message). You'll need that id to post back:
team.post(threadId, content, [mentions]).

Coordinate however makes sense — there is no designated planner, implementer, or
reviewer. Figure out the division of work yourselves.

Done-ness is judged by an external acceptance check, not by anything you say in
chat.
"""

[options.EXTRA_INITIAL_USER_PROMPT]
type = "string"
display.multiline = true
default = ""

[runtimes.executable]
path = "./run.sh"
arguments = []
